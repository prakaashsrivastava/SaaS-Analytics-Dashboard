version: '3.9'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: saas_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: saas_dashboard
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    build: .
    restart: unless-stopped
    depends_on: [db]
    environment:
      DATABASE_URL: postgresql://saas_user:${DB_PASSWORD:-password}@db:5432/saas_dashboard
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_xxxx}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@yourdomain.com}
    ports:
      - "3000:3000"
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  pgdata:
